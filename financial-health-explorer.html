<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Financial Health Diagnostic Explorer — CGAP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --teal-900: #0B3D3E;
    --teal-800: #0E4D64;
    --teal-700: #0E7C7B;
    --teal-600: #17A89C;
    --teal-100: #E6F5F4;
    --teal-50: #F0FAF9;
    --amber-700: #B8860B;
    --amber-500: #D4A017;
    --amber-100: #FEF5DC;
    --red-700: #9B2C2C;
    --red-500: #C0392B;
    --red-100: #FDE8E6;
    --violet-700: #553C7B;
    --violet-500: #6B4C9A;
    --violet-100: #EDE8F5;
    --slate-900: #1A2A3A;
    --slate-700: #3A5A6A;
    --slate-500: #5A7A8A;
    --slate-400: #7A9AAA;
    --slate-300: #A0B8C4;
    --slate-200: #C8D8E0;
    --slate-100: #E4ECF0;
    --slate-50: #F4F7F9;
    --white: #FFFFFF;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--slate-50);
    color: var(--slate-700);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── HEADER ─── */
  .header {
    background: linear-gradient(145deg, var(--teal-900) 0%, var(--teal-800) 40%, var(--teal-700) 100%);
    padding: 28px 40px 24px;
    color: var(--white);
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    top: -60%;
    right: -10%;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-inner { max-width: 1440px; margin: 0 auto; position: relative; z-index: 1; }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px 4px 8px;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    backdrop-filter: blur(4px);
  }
  .header-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
    font-optical-sizing: auto;
  }
  .header-sub {
    font-size: 13.5px;
    opacity: 0.75;
    font-weight: 400;
  }

  /* ─── SCENARIO SELECTOR ─── */
  .selector-bar {
    background: var(--white);
    border-bottom: 1px solid var(--slate-100);
    padding: 14px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .selector-inner {
    max-width: 1440px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .scenario-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--slate-200);
    background: var(--white);
    color: var(--slate-500);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: var(--font-body);
  }
  .scenario-btn:hover {
    border-color: var(--teal-600);
    color: var(--teal-700);
    background: var(--teal-50);
  }
  .scenario-btn.active {
    border-color: var(--teal-700);
    background: var(--teal-700);
    color: var(--white);
    box-shadow: 0 2px 8px rgba(14,124,123,0.25);
  }
  .scenario-icon { font-size: 16px; }

  /* ─── CONTEXT BAR ─── */
  .context-bar {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 14px 20px;
    background: var(--white);
    border-radius: var(--radius-lg);
    border: 1px solid var(--slate-100);
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .context-item-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--slate-400);
    margin-bottom: 2px;
  }
  .context-item-value { font-size: 13px; color: var(--slate-700); font-weight: 500; }
  .context-divider { width: 1px; height: 32px; background: var(--slate-100); flex-shrink: 0; }
  .context-actions { margin-left: auto; display: flex; gap: 8px; }

  .btn {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: var(--font-body);
    border: none;
  }
  .btn-ghost {
    background: var(--white);
    border: 1px solid var(--slate-200);
    color: var(--slate-500);
  }
  .btn-ghost:hover { border-color: var(--slate-300); color: var(--slate-700); }
  .btn-primary {
    background: var(--teal-700);
    color: var(--white);
    box-shadow: 0 1px 4px rgba(14,124,123,0.2);
  }
  .btn-primary:hover { background: var(--teal-800); }
  .btn-primary:disabled {
    background: var(--slate-200);
    color: var(--slate-400);
    cursor: default;
    box-shadow: none;
  }

  /* ─── PROGRESS BAR ─── */
  .progress-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
  }
  .progress-step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .progress-track {
    height: 4px;
    width: 100%;
    border-radius: 2px;
    background: var(--slate-100);
    transition: background 0.5s ease;
    position: relative;
    overflow: hidden;
  }
  .progress-track.active { background: var(--teal-600); }
  .progress-track.done { background: var(--teal-300); }
  .progress-label {
    font-size: 10.5px;
    color: var(--slate-300);
    font-weight: 400;
    transition: all 0.3s ease;
    text-align: center;
  }
  .progress-label.active { color: var(--teal-700); font-weight: 600; }
  .progress-label.done { color: var(--teal-600); font-weight: 500; }

  /* ─── THREE PANEL GRID ─── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr;
    gap: 16px;
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 40px;
  }
  .panel {
    background: var(--white);
    border-radius: var(--radius-lg);
    border: 1px solid var(--slate-100);
    padding: 18px;
    max-height: calc(100vh - 290px);
    overflow-y: auto;
  }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--slate-200); border-radius: 2px; }
  .panel-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--slate-400);
    margin-bottom: 12px;
  }

  /* ─── PHASE CARDS ─── */
  .phase-card {
    padding: 16px;
    border-radius: var(--radius-md);
    border: 1.5px solid var(--slate-100);
    background: var(--slate-50);
    margin-bottom: 10px;
    opacity: 0.45;
    transition: all 0.4s ease;
    transform: scale(0.98);
  }
  .phase-card.active {
    opacity: 1;
    transform: scale(1);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .phase-card.active.baseline { border-color: var(--teal-700); background: var(--teal-50); }
  .phase-card.active.shock { border-color: var(--amber-500); background: var(--amber-100); }
  .phase-card.active.response { border-color: var(--red-500); background: var(--red-100); }
  .phase-card.active.implication { border-color: var(--violet-500); background: var(--violet-100); }
  .phase-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .phase-title {
    font-family: var(--font-display);
    font-size: 14.5px;
    font-weight: 500;
    color: var(--slate-900);
    margin-bottom: 6px;
    letter-spacing: -0.2px;
  }
  .phase-desc {
    font-size: 12.5px;
    color: var(--slate-500);
    line-height: 1.65;
  }
  .mandate-tag {
    display: inline-block;
    font-size: 10.5px;
    padding: 3px 10px;
    border-radius: 12px;
    background: rgba(107,76,154,0.12);
    color: var(--violet-700);
    font-weight: 500;
    margin-right: 5px;
    margin-bottom: 4px;
  }
  .action-item {
    font-size: 12px;
    color: var(--slate-500);
    padding: 5px 0 5px 14px;
    border-left: 2px solid rgba(107,76,154,0.25);
    margin-bottom: 5px;
    line-height: 1.55;
  }

  /* ─── FRAMING INDICATOR GROUPS ─── */
  .fi-group { margin-bottom: 18px; }
  .fi-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    border-left: 3px solid var(--teal-700);
    margin-bottom: 5px;
  }
  .fi-dim-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.1px;
  }
  .fi-name { font-size: 11.5px; color: var(--slate-500); }

  /* ─── METRIC BARS ─── */
  .metric-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    transition: all 0.35s ease;
    border: 1.5px solid transparent;
  }
  .metric-row.highlighted { background: rgba(14,124,123,0.04); }
  .metric-row.affected { border-color: var(--amber-500); }
  .metric-label {
    width: 150px;
    flex-shrink: 0;
    font-size: 12px;
    color: var(--slate-500);
    line-height: 1.3;
  }
  .metric-label.highlighted { color: var(--slate-900); font-weight: 600; }
  .metric-dir { font-size: 9.5px; color: var(--slate-300); margin-left: 3px; }
  .metric-track {
    flex: 1;
    height: 8px;
    background: var(--slate-100);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .metric-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1.2s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .metric-fill.instant { transition: width 0.15s ease; }
  .metric-value {
    width: 40px;
    text-align: right;
    font-size: 12.5px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .metric-delta {
    width: 42px;
    text-align: right;
    font-size: 11px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    transition: opacity 0.4s ease;
  }

  /* ─── TRANSMISSION CHAIN ─── */
  .chain-wrapper {
    padding: 14px;
    background: var(--slate-50);
    border-radius: var(--radius-md);
    border: 1px solid var(--slate-100);
    margin-bottom: 16px;
  }
  .chain-step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    opacity: 0.25;
    transition: opacity 0.6s ease;
  }
  .chain-step.active { opacity: 1; }
  .chain-dot {
    width: 10px;
    height: 10px;
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 3px;
    transition: background 0.4s ease;
  }
  .chain-arrow {
    font-size: 10px;
    color: var(--slate-200);
    padding: 0 0 0 4px;
    transition: color 0.4s ease;
  }
  .chain-arrow.active { color: var(--slate-400); }
  .chain-label { font-size: 11.5px; font-weight: 600; }
  .chain-desc { font-size: 10.5px; color: var(--slate-400); }

  /* ─── INSIGHT BOX ─── */
  .insight-box {
    padding: 16px;
    border-radius: var(--radius-md);
    background: linear-gradient(140deg, var(--violet-100) 0%, #F5F0FA 100%);
    border: 1px solid rgba(107,76,154,0.18);
    margin-bottom: 16px;
    animation: fadeSlideIn 0.6s ease both;
  }
  .insight-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--violet-700);
    margin-bottom: 8px;
  }
  .insight-text {
    font-size: 12.5px;
    color: var(--slate-700);
    line-height: 1.7;
  }

  /* ─── KEY METRICS SUMMARY ─── */
  .key-metric-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: var(--radius-sm);
    margin-bottom: 3px;
    transition: background 0.3s ease;
  }
  .key-metric-row.changed { background: rgba(192,57,43,0.04); }
  .key-metric-dot {
    width: 6px;
    height: 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .key-metric-name { flex: 1; font-size: 11.5px; color: var(--slate-500); }
  .key-metric-val { font-size: 11px; font-weight: 600; color: var(--slate-400); font-variant-numeric: tabular-nums; }
  .key-metric-arrow { font-size: 10px; color: var(--slate-300); }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    padding: 32px 20px;
    text-align: center;
    color: var(--slate-400);
  }
  .empty-state-icon { font-size: 36px; margin-bottom: 14px; }
  .empty-state-title { font-family: var(--font-display); font-size: 15px; font-weight: 500; color: var(--slate-700); margin-bottom: 6px; }
  .empty-state-text { font-size: 12.5px; line-height: 1.7; max-width: 280px; margin: 0 auto; }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center;
    padding: 24px 40px 16px;
    font-size: 11px;
    color: var(--slate-300);
    line-height: 1.7;
    max-width: 1440px;
    margin: 0 auto;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 1100px) {
    .main-grid { grid-template-columns: 1fr 1fr; }
    .panel:first-child { grid-column: 1 / -1; }
    .header { padding: 20px 24px; }
    .selector-bar { padding: 12px 24px; }
    .main-grid { padding: 0 24px; }
  }
  @media (max-width: 720px) {
    .main-grid { grid-template-columns: 1fr; }
    .panel:first-child { grid-column: auto; }
    .context-bar { flex-direction: column; align-items: flex-start; gap: 12px; }
    .context-divider { display: none; }
    .context-actions { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useCallback } = React;

// ─── DATA ─────────────────────────────────────────────────────────────────────

const FRAMING_INDICATORS = [
  { id:"fi1", name:"Pays for basic needs without strain", dimension:"Manage", color:"#0E7C7B" },
  { id:"fi2", name:"Transacts safely with financial infrastructure", dimension:"Manage", color:"#17A89C" },
  { id:"fi3", name:"Sustainable debt load & repayment", dimension:"Manage", color:"#1B8A6B" },
  { id:"fi4", name:"Resources to cover unexpected expenses", dimension:"Cope", color:"#B8860B" },
  { id:"fi5", name:"Participates in long-term savings/investments", dimension:"Pursue", color:"#2E86AB" },
  { id:"fi6", name:"Financial confidence, control & satisfaction", dimension:"Feel", color:"#6B4C9A" },
];

const METRICS = [
  { id:"m1",  name:"Positive net cashflow",              fiId:"fi1", dir:"+", short:"Net cashflow" },
  { id:"m2",  name:"Material deprivation incidence",     fiId:"fi1", dir:"-", short:"Material deprivation" },
  { id:"m3",  name:"Bills in arrears",                   fiId:"fi1", dir:"-", short:"Bills in arrears" },
  { id:"m4",  name:"Overdrafts & NSF events",            fiId:"fi1", dir:"-", short:"Overdrafts / NSF" },
  { id:"m5",  name:"Unauthorized financial loss",        fiId:"fi2", dir:"-", short:"Fraud / unauthorized loss" },
  { id:"m6",  name:"Debt in arrears or delinquency",     fiId:"fi3", dir:"-", short:"Debt arrears" },
  { id:"m7",  name:"Sustainable debt service ratio",     fiId:"fi3", dir:"+", short:"Debt service ratio" },
  { id:"m8",  name:"Reliable access to emergency funds", fiId:"fi4", dir:"+", short:"Emergency fund access" },
  { id:"m9",  name:"Emergency savings buffer",           fiId:"fi4", dir:"+", short:"Savings buffer" },
  { id:"m10", name:"Active insurance coverage",          fiId:"fi4", dir:"+", short:"Insurance coverage" },
  { id:"m11", name:"Active long-term saving",            fiId:"fi5", dir:"+", short:"Long-term saving" },
  { id:"m12", name:"Investment in productive assets",    fiId:"fi5", dir:"+", short:"Productive assets" },
  { id:"m13", name:"Pension / retirement account",       fiId:"fi5", dir:"+", short:"Pension account" },
  { id:"m14", name:"Satisfaction with financial situation", fiId:"fi6", dir:"+", short:"Financial satisfaction" },
  { id:"m15", name:"Perceived financial control",        fiId:"fi6", dir:"+", short:"Financial control" },
  { id:"m16", name:"Financial stress or worry",          fiId:"fi6", dir:"-", short:"Financial stress" },
  { id:"m17", name:"Confidence in future outlook",       fiId:"fi6", dir:"+", short:"Future confidence" },
];

const getFI = id => FRAMING_INDICATORS.find(f => f.id === id);

const healthColor = (val, dir) => {
  const eff = dir === "-" ? 100 - val : val;
  if (eff >= 65) return "#0E7C7B";
  if (eff >= 40) return "#B8860B";
  return "#C0392B";
};

const SCENARIOS = {
  climate: {
    id:"climate", title:"Climate Shock on Agricultural Households",
    subtitle:"Drought impacts rural farming communities",
    region:"Sub-Saharan Africa (illustrative)", segment:"Agricultural households in climate-exposed regions", icon:"🌾",
    highlight:["m9","m10","m12","m6","m7"],
    base:{ m1:55, m2:30, m3:25, m4:15, m5:10, m6:12, m7:62, m8:35, m9:18, m10:8, m11:22, m12:65, m13:5, m14:45, m15:50, m16:40, m17:48 },
    shock:{ m1:25, m2:58, m3:48, m4:30, m5:10, m6:38, m7:42, m8:20, m9:5, m10:8, m11:10, m12:30, m13:5, m14:22, m15:28, m16:72, m17:20 },
    phases:[
      { title:"Baseline State", type:"baseline",
        desc:"Agricultural households show moderate financial health: thin but positive cashflows, low insurance coverage (8%), modest savings buffers (~1 month), but meaningful investment in productive assets (land, livestock at 65%). Debt service ratios are manageable." },
      { title:"Shock: Severe Drought", type:"shock", affected:["m1","m2","m9"],
        desc:"A prolonged drought destroys crops and decimates livestock. Farm income collapses. Households draw down emergency savings to cover daily needs. Those without insurance—92% of this segment—have no mechanism to transfer the catastrophic loss." },
      { title:"Metric Response: Cascading Effects", type:"response", affected:["m12","m6","m3","m7"],
        desc:"Savings buffers are depleted (18% → 5%). Households liquidate productive assets—livestock, equipment—to survive (65% → 30%). Material deprivation nearly doubles. Debt arrears begin rising as loan repayments are missed. The transmission from shock to balance sheet stress is underway." },
      { title:"Supervisory Implication", type:"implication",
        desc:"The combination of depleted savings + low insurance + distress asset liquidation signals latent credit risk in agricultural lending portfolios. Collateral values are impaired precisely when borrowers can least afford defaults. An FSA monitoring these metrics jointly can alert lenders before NPL ratios spike.",
        mandates:["Prudential oversight","Financial inclusion","Consumer protection"],
        actions:[
          "Flag agricultural lending portfolios for enhanced monitoring",
          "Coordinate with insurance regulators on parametric crop insurance gaps",
          "Assess whether current provisioning reflects latent collateral impairment",
          "Consider targeted loan restructuring guidance for climate-affected districts"
        ]},
    ],
  },
  digital: {
    id:"digital", title:"Rapid Digital Credit Expansion",
    subtitle:"New mobile lending drives credit access—and risk",
    region:"East Africa / South Asia (illustrative)", segment:"Young, low-income, first-time digital borrowers", icon:"📱",
    highlight:["m7","m6","m4","m9","m16"],
    base:{ m1:50, m2:25, m3:20, m4:10, m5:12, m6:8, m7:72, m8:30, m9:15, m10:6, m11:18, m12:40, m13:4, m14:52, m15:55, m16:35, m17:58 },
    shock:{ m1:32, m2:35, m3:38, m4:35, m5:18, m6:32, m7:38, m8:22, m9:8, m10:6, m11:10, m12:35, m13:4, m14:30, m15:32, m16:65, m17:30 },
    phases:[
      { title:"Baseline State", type:"baseline",
        desc:"Digital financial inclusion is expanding. Account ownership is rising rapidly among young adults. Baseline debt levels are low, savings are thin but stable, and financial confidence is moderate. Most borrowing is still informal." },
      { title:"Shock: Digital Credit Proliferation", type:"shock", affected:["m7","m4","m6"],
        desc:"Multiple digital lenders enter the market simultaneously offering instant small loans via mobile money. Aggressive marketing targets young, low-income users. Many take multiple concurrent loans. Within 18 months the segment's debt profile transforms." },
      { title:"Metric Response: Over-indebtedness Builds", type:"response", affected:["m9","m3","m1","m16"],
        desc:"Debt service ratios collapse from 72% sustainable to 38%. Overdraft/NSF events triple. Multiple borrowing creates a debt spiral: new loans repay old ones. Savings are consumed by debt service. Bills in arrears nearly double as households prioritize loan repayments over utilities." },
      { title:"Supervisory Implication", type:"implication",
        desc:"The pattern reveals a consumer protection and prudential concern: expanding access without adequate affordability checks is generating over-indebtedness in a vulnerable segment. The rising debt arrears will eventually surface as NPLs—but by then borrowers' financial health is already severely impaired.",
        mandates:["Consumer protection","Prudential oversight","Financial inclusion"],
        actions:[
          "Review affordability assessment requirements for digital lenders",
          "Mandate credit bureau checks before loan disbursement",
          "Investigate multiple concurrent borrowing patterns via credit registry data",
          "Consider cooling-off periods or borrowing frequency limits",
          "Assess whether digital lending is meeting inclusion goals or creating new risks"
        ]},
    ],
  },
  rates: {
    id:"rates", title:"Interest Rate Hiking Cycle",
    subtitle:"Monetary tightening squeezes leveraged households",
    region:"Middle-income economy (illustrative)", segment:"Households with variable-rate consumer or mortgage debt", icon:"📈",
    highlight:["m7","m3","m9","m14","m16"],
    base:{ m1:68, m2:12, m3:15, m4:12, m5:8, m6:10, m7:70, m8:55, m9:45, m10:35, m11:42, m12:50, m13:28, m14:62, m15:65, m16:28, m17:60 },
    shock:{ m1:42, m2:22, m3:38, m4:28, m5:8, m6:28, m7:40, m8:38, m9:18, m10:30, m11:30, m12:45, m13:25, m14:35, m15:38, m16:62, m17:28 },
    phases:[
      { title:"Baseline State", type:"baseline",
        desc:"A middle-income economy with relatively mature financial inclusion. Households carry moderate mortgage and consumer debt at low interest rates. Savings buffers are reasonable (~3 months), insurance coverage is moderate, and financial satisfaction is above the midpoint." },
      { title:"Shock: 400bps Rate Increase", type:"shock", affected:["m7","m1"],
        desc:"The central bank raises the policy rate by 400 basis points over 18 months to combat inflation. Variable-rate loans—mortgages, consumer credit, SME facilities—reprice. Monthly payments increase substantially for leveraged households." },
      { title:"Metric Response: Balance Sheet Squeeze", type:"response", affected:["m9","m3","m6","m16","m14"],
        desc:"Debt service ratios deteriorate sharply (70% → 40% sustainable). Savings buffers drawn down to cover payments (45% → 18%). Bills in arrears rise as households triage obligations. Financial stress doubles. The squeeze concentrates on young homeowners with high LTV ratios." },
      { title:"Supervisory Implication", type:"implication",
        desc:"Aggregate prudential indicators may remain acceptable even as specific household segments experience severe stress. Financial health metrics reveal the distributional impact that aggregates mask—the stress is concentrated among variable-rate borrowers in specific LTV bands.",
        mandates:["Macroprudential policy","Prudential oversight","Consumer protection"],
        actions:[
          "Run targeted stress tests on lender portfolios with high variable-rate exposure",
          "Monitor DSR distributions by borrower segment in supervisory returns",
          "Assess adequacy of provisioning for concentrated household stress",
          "Consider macroprudential guidance on variable-rate lending standards",
          "Publish financial health indicators in Financial Stability Report"
        ]},
    ],
  },
};

// ─── COMPONENTS ───────────────────────────────────────────────────────────────

function MetricBar({ metric, value, prevValue, highlighted, affected, animating }) {
  const fi = getFI(metric.fiId);
  const col = healthColor(value, metric.dir);
  const changed = prevValue != null && prevValue !== value;
  const delta = changed ? value - prevValue : 0;
  const cls = "metric-row" + (highlighted ? " highlighted" : "") + (affected && animating ? " affected" : "");

  return (
    <div className={cls}>
      <div className={"metric-label" + (highlighted ? " highlighted" : "")}>
        {metric.short}<span className="metric-dir">({metric.dir})</span>
      </div>
      <div className="metric-track">
        <div className={"metric-fill" + (animating ? "" : " instant")}
          style={{ width: value + "%", background: col }} />
      </div>
      <div className="metric-value" style={{ color: col }}>{value}%</div>
      {changed
        ? <div className="metric-delta" style={{ color: delta > 0 ? "#0E7C7B" : "#C0392B" }}>
            {delta > 0 ? "▲" : "▼"}{Math.abs(delta)}
          </div>
        : <div className="metric-delta" />
      }
    </div>
  );
}

function FIGroup({ fi, values, prevValues, highlights, affected, animating }) {
  const mets = METRICS.filter(m => m.fiId === fi.id);
  return (
    <div className="fi-group">
      <div className="fi-header" style={{ borderLeftColor: fi.color }}>
        <span className="fi-dim-label" style={{ color: fi.color }}>{fi.dimension}</span>
        <span className="fi-name">{fi.name}</span>
      </div>
      {mets.map(m =>
        <MetricBar key={m.id} metric={m} value={values[m.id]} prevValue={prevValues?.[m.id]}
          highlighted={highlights.includes(m.id)} affected={affected.includes(m.id)} animating={animating} />
      )}
    </div>
  );
}

function PhaseCard({ phase, idx, active }) {
  const colors = {
    baseline: { badge: "#0E7C7B", icon: "📊", label: "Baseline" },
    shock:    { badge: "#B8860B", icon: "⚡", label: "Shock Event" },
    response: { badge: "#C0392B", icon: "📉", label: "Metric Response" },
    implication:{ badge: "#6B4C9A", icon: "🔍", label: "Supervisory Insight" },
  };
  const c = colors[phase.type];

  return (
    <div className={"phase-card " + phase.type + (active ? " active" : "")}>
      <div className="phase-type-badge" style={{ color: c.badge }}>
        <span>{c.icon}</span>{c.label}
      </div>
      <div className="phase-title">{phase.title}</div>
      <div className="phase-desc">{phase.desc}</div>
      {phase.type === "implication" && active && (
        <div style={{ marginTop: 14 }}>
          <div className="panel-label" style={{ color: "#6B4C9A" }}>Mandates implicated</div>
          <div style={{ marginBottom: 10 }}>
            {phase.mandates.map(m => <span key={m} className="mandate-tag">{m}</span>)}
          </div>
          <div className="panel-label" style={{ color: "#6B4C9A" }}>Potential supervisory actions</div>
          {phase.actions.map((a,i) => <div key={i} className="action-item">{a}</div>)}
        </div>
      )}
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────────

function App() {
  const [scenarioId, setScenarioId] = useState("climate");
  const [phase, setPhase] = useState(0);
  const [animating, setAnimating] = useState(false);

  const sc = SCENARIOS[scenarioId];
  const p = sc.phases[phase];

  const getVals = useCallback(() => {
    if (phase === 0) return { ...sc.base };
    if (phase >= 2) return { ...sc.shock };
    const v = { ...sc.base };
    (sc.phases[1].affected || []).forEach(id => { v[id] = sc.shock[id]; });
    return v;
  }, [phase, sc]);

  const getPrev = useCallback(() => {
    if (phase === 0) return null;
    if (phase === 1) return { ...sc.base };
    if (phase === 2) {
      const v = { ...sc.base };
      (sc.phases[1].affected || []).forEach(id => { v[id] = sc.shock[id]; });
      return v;
    }
    return { ...sc.shock };
  }, [phase, sc]);

  const vals = getVals();
  const prev = getPrev();
  const affected = p.affected || [];

  const advance = () => {
    if (phase < sc.phases.length - 1) {
      setAnimating(true);
      setPhase(p => p + 1);
      setTimeout(() => setAnimating(false), 1400);
    }
  };
  const reset = () => { setPhase(0); setAnimating(false); };
  const pick = id => { setScenarioId(id); setPhase(0); setAnimating(false); };

  const chainSteps = [
    { label:"Shock event", desc: sc.phases[1]?.title || "", col:"#B8860B", at: 1 },
    { label:"Metric deterioration", desc:"Multiple metrics move simultaneously", col:"#C0392B", at: 2 },
    { label:"Cross-metric pattern", desc:"Combined vulnerability emerges", col:"#C0392B", at: 2 },
    { label:"Supervisory signal", desc:"Actionable insight for FSA", col:"#6B4C9A", at: 3 },
  ];

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-inner">
          <div className="header-badge">
            <span>🏛️</span> CGAP Measurement Toolkit
          </div>
          <div className="header-title">Financial Health Diagnostic Explorer</div>
          <div className="header-sub">Interactive scenario analysis — How financial health metrics inform supervisory practice</div>
        </div>
      </div>

      {/* Scenario Selector */}
      <div className="selector-bar">
        <div className="selector-inner">
          {Object.values(SCENARIOS).map(s =>
            <button key={s.id} className={"scenario-btn" + (scenarioId === s.id ? " active" : "")}
              onClick={() => pick(s.id)}>
              <span className="scenario-icon">{s.icon}</span>{s.title}
            </button>
          )}
        </div>
      </div>

      {/* Content area */}
      <div style={{ maxWidth: 1440, margin: "0 auto", padding: "18px 40px" }}>

        {/* Context Bar */}
        <div className="context-bar">
          <div>
            <div className="context-item-label">Scenario</div>
            <div className="context-item-value">{sc.icon} {sc.title}</div>
          </div>
          <div className="context-divider" />
          <div>
            <div className="context-item-label">Population Segment</div>
            <div className="context-item-value" style={{ fontWeight: 400 }}>{sc.segment}</div>
          </div>
          <div className="context-divider" />
          <div>
            <div className="context-item-label">Region</div>
            <div className="context-item-value" style={{ fontWeight: 400 }}>{sc.region}</div>
          </div>
          <div className="context-actions">
            <button className="btn btn-ghost" onClick={reset}>↺ Reset</button>
            <button className="btn btn-primary" onClick={advance} disabled={phase >= sc.phases.length - 1}>
              {phase === 0 ? "Begin →" : phase >= sc.phases.length - 1 ? "Complete ✓" : "Next Step →"}
            </button>
          </div>
        </div>

        {/* Progress */}
        <div className="progress-bar">
          {sc.phases.map((pp, i) =>
            <div key={i} className="progress-step">
              <div className={"progress-track" + (i === phase ? " active" : i < phase ? " done" : "")} />
              <span className={"progress-label" + (i === phase ? " active" : i < phase ? " done" : "")}>
                {pp.title}
              </span>
            </div>
          )}
        </div>

        {/* Three-panel Grid */}
        <div className="main-grid">

          {/* Panel 1: Phases */}
          <div className="panel">
            <div className="panel-label">Scenario Phases</div>
            {sc.phases.map((pp, i) =>
              <PhaseCard key={i} phase={pp} idx={i} active={i === phase} />
            )}
          </div>

          {/* Panel 2: Dashboard */}
          <div className="panel">
            <div className="panel-label">Financial Health Dashboard</div>
            <div style={{ fontSize: 11, color: "var(--slate-400)", marginBottom: 14 }}>
              17 metrics across 6 framing indicators · Highlighted metrics are most relevant to this scenario
            </div>
            {FRAMING_INDICATORS.map(fi =>
              <FIGroup key={fi.id} fi={fi} values={vals} prevValues={prev}
                highlights={sc.highlight} affected={affected} animating={animating} />
            )}
          </div>

          {/* Panel 3: Transmission Chain */}
          <div className="panel">
            <div className="panel-label">Supervisory Transmission Chain</div>

            {phase === 0 ? (
              <div className="empty-state">
                <div className="empty-state-icon">📊</div>
                <div className="empty-state-title">Baseline state established</div>
                <div className="empty-state-text">
                  Click <strong>Begin →</strong> to trigger the shock event and watch how financial health metrics respond and transmit into supervisory concerns.
                </div>
              </div>
            ) : (
              <div>
                {/* Chain */}
                <div className="chain-wrapper">
                  <div style={{ fontSize: 12, fontWeight: 600, color: "var(--slate-900)", marginBottom: 10 }}>
                    Transmission chain
                  </div>
                  {chainSteps.map((s,i) => (
                    <React.Fragment key={i}>
                      <div className={"chain-step" + (phase >= s.at ? " active" : "")}>
                        <div className="chain-dot" style={{ background: phase >= s.at ? s.col : "var(--slate-200)" }} />
                        <div>
                          <div className="chain-label" style={{ color: phase >= s.at ? s.col : "var(--slate-300)" }}>{s.label}</div>
                          <div className="chain-desc">{s.desc}</div>
                        </div>
                      </div>
                      {i < chainSteps.length - 1 &&
                        <div className={"chain-arrow" + (phase >= s.at ? " active" : "")} style={{ paddingLeft: 4 }}>↓</div>
                      }
                    </React.Fragment>
                  ))}
                </div>

                {/* Insight box at final phase */}
                {phase >= 3 && (
                  <div className="insight-box">
                    <div className="insight-title">Why multidimensional measurement matters</div>
                    <div className="insight-text">
                      No single metric in this scenario would, on its own, trigger supervisory action. It is the <strong>combination</strong> of movements across framing indicators that reveals the emerging risk. This is why the CGAP framework preserves metric-level diagnostic specificity rather than collapsing metrics into a single composite index.
                    </div>
                  </div>
                )}

                {/* Key metrics */}
                <div className="panel-label" style={{ marginTop: 4 }}>Key metrics in motion</div>
                {sc.highlight.map(mId => {
                  const m = METRICS.find(x => x.id === mId);
                  const fi = getFI(m.fiId);
                  const base = sc.base[mId];
                  const current = vals[mId];
                  const changed = current !== base;
                  const delta = current - base;
                  return (
                    <div key={mId} className={"key-metric-row" + (changed ? " changed" : "")}>
                      <div className="key-metric-dot" style={{ background: fi.color }} />
                      <div className="key-metric-name">{m.short}</div>
                      <div className="key-metric-val">{base}%</div>
                      {changed && (
                        <>
                          <div className="key-metric-arrow">→</div>
                          <div className="key-metric-val" style={{ color: delta > 0 ? "#0E7C7B" : "#C0392B" }}>
                            {current}%
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

        </div>

        {/* Footer */}
        <div className="footer">
          Financial Health Diagnostic Explorer · Based on the CGAP Financial Health Measurement Toolkit<br/>
          Illustrative data for demonstration purposes · Metric values represent the share of a population segment in a healthy range
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
